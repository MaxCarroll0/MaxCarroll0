name: Update README cards
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=readme-tools&repo=github-readme-stats
          path: profile/pin-readme-tools-github-readme-stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push

      - name: Generate metrics card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_PAT }}
          filename: profile/metrics.svg
          base: ""
          config_order: languages, lines, stars, habits
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 0
          plugin_languages_threshold: 0%
          plugin_languages_other: no
          plugin_languages_colors: github
          plugin_languages_categories: data, markup, programming, prose
          plugin_languages_recent_categories: data, markup, programming, prose
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 14
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15
          repositories_affiliations: owner, collaborator
          plugin_languages_indepth_custom: hazelgrove/hazel@witnesses-type-slicing, Extreme-Kayaking/kayak-hull-optimisation
          commits_authoring: ${{ github.repository_owner }}, mjvcarroll@gmail.com
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_lines_repositories_limit: 6
          plugin_stars: yes
          plugin_stars_limit: 6
          plugin_habits: yes
          plugin_habits_from: 1000
          plugin_habits_days: 60
          plugin_habits_facts: yes
          plugin_habits_charts: yes
