# Settings for the README language-stats generator (scripts/stats.lua).

work_dir = "/tmp/loc-stats"

[identities]
emails = [
  "133233123+MaxCarroll0@users.noreply.github.com",
  "mjvcarroll@gmail.com",
  "mjvcaroll@gmail.com", # typo variant, intentional
]

[owned]
enabled = true
visibility = "all"
include_forks = false
include_archived = false

[counting]
blame_flags = "-w" # add "-M -C" to follow moved/copied lines
dedupe_shared_history = true
# Build/generated paths dropped from every metric (tokei --exclude globs). Repos are source-only (Nix builds
# out-of-tree), so this is mostly a safety net; add committed generated files here if you want them out too.
exclude = [
  "_build", "dist", "target", "node_modules", "vendor", ".dart_tool", "__pycache__",
  "*.min.js", "*.min.css", "*.pb.go", "*.g.dart", "*.freezed.dart",
  "package-lock.json", "yarn.lock", "pnpm-lock.yaml", "Cargo.lock",
]

[recent]
days = 90

[languages]
hide = ["SVG", "Plain Text", "Autoconf"]

[languages.merge]
# tokei folds .re/.rei into OCaml; relabel to show both.
"OCaml" = "OCaml/Reason"
# fold tokei's header split and the bibliography sub-language into their parent
"C Header" = "C"
"C++ Header" = "C++"
"BibTeX" = "TeX"

[languages.urls]
# Homepage links come from scripts/lib/langurls.lua (generated from DBpedia/Wikidata by gen-langurls.lua).
# These per-display-name overrides win over it: data formats those sources lack a homepage for, plus
# nicer targets than the generated ones (e.g. cppreference over the ISO paywall).
"C" = "https://en.cppreference.com/w/c"
"C++" = "https://isocpp.org"
"Org" = "https://orgmode.org"
"Shell" = "https://www.gnu.org/software/bash/"
"HTML" = "https://html.spec.whatwg.org/"
"CSS" = "https://www.w3.org/Style/CSS/"
"Markdown" = "https://commonmark.org"
"JSON" = "https://www.json.org"
"YAML" = "https://yaml.org"
"TOML" = "https://toml.io"
"Edn" = "https://github.com/edn-format/edn"

[breakdown]
# Per-row dropdown: every private repo collapses into one row carrying this label.
private_label = "Private"

[groups]
# Languages are classified by GitHub Linguist's `type` (see lib/langgroups.lua).
order = ["Programming", "Prose", "Configs / Data"]
per_group = 12        # max languages shown per class; the rest fold into one "Other" row
other_label = "Other"

[groups.overrides]
"Nix" = "Configs / Data"
# e.g. move stylesheets out of Prose: "CSS" = "Configs / Data"

[output]
readme = "README.md"
assets = "assets"
# Lay the language classes into columns; classes in the same column stack vertically.
columns = [["Programming"], ["Prose", "Configs / Data"]]

[output.markers.totals]
start = "<!-- TOTALS:START -->"
finish = "<!-- TOTALS:END -->"

[output.markers.top]
start = "<!-- TOP-LANGS:START -->"
finish = "<!-- TOP-LANGS:END -->"

[output.markers.recent]
start = "<!-- RECENT-LANGS:START -->"
finish = "<!-- RECENT-LANGS:END -->"

